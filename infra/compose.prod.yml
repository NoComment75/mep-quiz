version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    env_file: ../mep.env
    environment:
      - POSTGRES_DB=mepquiz
      - POSTGRES_USER=mepquiz
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    env_file: ../mep.env
    depends_on: [postgres, redis]
    volumes:
      - ../data:/app/data:ro

  worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    command: rq worker mepquiz
    env_file: ../mep.env
    depends_on:
      - redis
      - postgres

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ../web/dist:/usr/share/nginx/html:ro
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
